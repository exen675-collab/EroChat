services:
    erochat:
        build: .
        container_name: erochat
        ports:
            - '20121:20121'
        environment:
            PORT: 20121
            SESSION_SECRET: change-this-secret
            COOKIE_SECURE: 'false'
            DEFAULT_USER_CREDITS: 100
        volumes:
            - ./data:/app/data
        restart: unless-stopped
